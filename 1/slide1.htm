<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Por que eu amo TI - Capa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&amp;family=Roboto+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            overflow: hidden;
            background-color: #0f172a;
        }
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://page.gensparksite.com/slides_images/09e4db47ca9af0c448db919c50263073.webp");
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            mix-blend-mode: overlay;
        }
        /* Custom Neon Effects using shadows instead of gradients */
        .neon-text-cyan {
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.7), 0 0 20px rgba(0, 243, 255, 0.5);
        }
        .neon-text-purple {
            color: #bd00ff;
            text-shadow: 0 0 10px rgba(189, 0, 255, 0.7), 0 0 20px rgba(189, 0, 255, 0.5);
        }
        .neon-border {
            border: 1px solid #00f3ff;
            box-shadow: 0 0 5px rgba(0, 243, 255, 0.5), inset 0 0 5px rgba(0, 243, 255, 0.2);
        }
        .glass-panel {
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .code-font {
            font-family: 'Roboto Mono', monospace;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
<div class="slide-container text-white">
<!-- Background Elements -->
<div class="bg-image"></div>
<!-- Decorative geometric shapes (simulating tech vibes) -->
<div class="absolute top-0 right-0 w-1/2 h-full border-l border-white/5 bg-white/5 transform skew-x-12 translate-x-20"></div>
<div class="absolute bottom-10 left-10 w-24 h-24 border border-cyan-500/30 rounded-full"></div>
<div class="absolute top-20 right-20 w-16 h-16 border border-purple-500/30 rounded-full"></div>
<!-- Main Content Wrapper -->
<div class="relative z-10 flex flex-col justify-center items-start w-full h-full px-24">
<!-- Code Tag Decoration -->
<div class="mb-6 opacity-70 flex items-center justify-between w-full max-w-4xl">
<p class="code-font text-cyan-400 text-lg">&lt;Presentation /&gt;</p>
<!-- Student Name & Class Added Here -->
<div class="flex items-center gap-4 border-b border-purple-500/30 pb-1">
<p class="code-font text-purple-300 text-base font-bold">Pedro Pereira</p>
<span class="text-gray-500">|</span>
<p class="code-font text-cyan-300 text-base">Turma 3°F</p>
</div>
</div>
<!-- Main Title Area -->
<div class="mb-2">
<h1 class="text-8xl font-black tracking-tighter leading-tight mb-2">
<span class="text-white">POR QUE</span><br/>
<span class="text-white">EU AMO</span>
<span class="neon-text-cyan text-9xl ml-2">TI</span><span class="text-cyan-400">?</span>
</h1>
</div>
<!-- Subtitle -->
<div class="w-2/3 mb-12">
<p class="text-2xl text-gray-300 font-light leading-relaxed border-l-4 border-purple-500 pl-6">
                    Curiosidade, criação e impacto em cada projeto.
                    Uma jornada pelo universo da tecnologia.
                </p>
</div>
<!-- Highlight Pills -->
<div class="flex flex-wrap gap-6 mt-4">
<div class="flex items-center gap-3 px-6 py-3 rounded-full glass-panel neon-border">
<i class="fas fa-puzzle-piece text-cyan-400 text-xl"></i>
<p class="font-bold tracking-wide uppercase text-sm text-cyan-100">Resolução de Problemas</p>
</div>
<div class="flex items-center gap-3 px-6 py-3 rounded-full glass-panel border border-purple-500/50 box-shadow-purple">
<i class="fas fa-lightbulb text-purple-400 text-xl"></i>
<p class="font-bold tracking-wide uppercase text-sm text-purple-100">Inovação</p>
</div>
<div class="flex items-center gap-3 px-6 py-3 rounded-full glass-panel border border-pink-500/50">
<i class="fas fa-globe text-pink-400 text-xl"></i>
<p class="font-bold tracking-wide uppercase text-sm text-pink-100">Impacto</p>
</div>
<div class="flex items-center gap-3 px-6 py-3 rounded-full glass-panel border border-green-500/50">
<i class="fas fa-rocket text-green-400 text-xl"></i>
<p class="font-bold tracking-wide uppercase text-sm text-green-100">Carreira</p>
</div>
</div>
<!-- Footer Decoration -->
<div class="absolute bottom-12 right-12 flex items-center gap-4 opacity-50">
<div class="text-right">
<p class="code-font text-xs text-gray-400">System.out.println("Hello World");</p>
<p class="code-font text-xs text-gray-400">v1.0.0</p>
</div>
<i class="fas fa-terminal text-3xl text-gray-500"></i>
</div>
</div>
<!-- Right Side Graphic Overlay (Abstract Tech) -->
<div class="absolute right-0 top-1/2 transform -translate-y-1/2 translate-x-1/4 opacity-20 pointer-events-none">
<i class="fas fa-network-wired text-[400px] text-cyan-900 animate-float"></i>
</div>
</div>
</body>
</html>
